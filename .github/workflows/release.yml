name: Release
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test -v -race ./...

      - name: Build binaries for multiple platforms
        run: |
          # Create build directory
          mkdir -p dist

          # Build for different platforms
          GOOS=linux GOARCH=amd64 go build -ldflags="-X main.version=${{ github.ref_name }}" -o dist/goutui-linux-amd64 ./cmd/goutui
          GOOS=linux GOARCH=arm64 go build -ldflags="-X main.version=${{ github.ref_name }}" -o dist/goutui-linux-arm64 ./cmd/goutui
          GOOS=darwin GOARCH=amd64 go build -ldflags="-X main.version=${{ github.ref_name }}" -o dist/goutui-darwin-amd64 ./cmd/goutui
          GOOS=darwin GOARCH=arm64 go build -ldflags="-X main.version=${{ github.ref_name }}" -o dist/goutui-darwin-arm64 ./cmd/goutui
          GOOS=windows GOARCH=amd64 go build -ldflags="-X main.version=${{ github.ref_name }}" -o dist/goutui-windows-amd64.exe ./cmd/goutui

          # Make Linux binaries executable
          chmod +x dist/goutui-linux-*

      - name: Create release archives
        run: |
          cd dist
          tar -czf goutui-linux-amd64.tar.gz goutui-linux-amd64
          tar -czf goutui-linux-arm64.tar.gz goutui-linux-arm64
          tar -czf goutui-darwin-amd64.tar.gz goutui-darwin-amd64
          tar -czf goutui-darwin-arm64.tar.gz goutui-darwin-arm64
          zip goutui-windows-amd64.zip goutui-windows-amd64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/goutui-linux-amd64.tar.gz
            dist/goutui-linux-arm64.tar.gz
            dist/goutui-darwin-amd64.tar.gz
            dist/goutui-darwin-arm64.tar.gz
            dist/goutui-windows-amd64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
